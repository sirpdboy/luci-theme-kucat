name: Build Packages

on:
  workflow_dispatch:
  push:
    tags:
      - v*

jobs:
  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_cortex-a76
          - aarch64_generic
          - arm_cortex-a7
          - arm_cortex-a9
          - mips_24kc
          - mipsel_24kc
          - riscv64_riscv64
          - x86_64
        sdk:
          - openwrt-24.10
          - SNAPSHOT

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare package feed
        run: |
            mkdir -p feed/luci-theme-kucat
            if [ -f "Makefile" ]; then
            echo "Makefile found in root, copying all files"
            cp -r * feed/luci-theme-kucat/ 2>/dev/null || true
            # 如果Makefile在子目录
            elif [ -f "luci-theme-kucat/Makefile" ]; then
            echo "Makefile found in luci-app-kucat-config subdirectory"
            cp -r luci-theme-kucat/* feed/luci-theme-kucat/
            else
            echo "ERROR: Cannot find Makefile"
            find . -name "Makefile"
            exit 1
            fi
            echo "Final feed structure:"
            ls -la feed/luci-theme-kucat/
      - name: Build packages
        uses: sirpdboy/gh-action-sdk@go1.26
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-theme-kucat
          FEED_DIR: ${{ github.workspace }}/feed
          NO_REFRESH_CHECK: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}
          path: |
            bin/packages/${{ matrix.arch }}/packages_ci/*.apk
            bin/packages/riscv64_generic/packages_ci/*.apk
            bin/packages/${{ matrix.arch }}/packages_ci/*.ipk
      - name: Create release archive
        run: |
          if [ "${{ matrix.arch }}" = "riscv64_riscv64" ] && [ "${{ matrix.sdk }}" = "SNAPSHOT" ]; then
            tar -zcvf ${{ matrix.sdk }}-${{ matrix.arch }}.tar.gz -C bin/packages/riscv64_generic/ packages_ci
          else
            tar -zcvf ${{ matrix.sdk }}-${{ matrix.arch }}.tar.gz -C bin/packages/${{ matrix.arch }}/ packages_ci
          fi
      - name: Upload to release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          prerelease: false
          artifacts: "${{ matrix.sdk }}-${{ matrix.arch }}.tar.gz"
